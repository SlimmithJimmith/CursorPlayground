<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordGuess - The Addictive Word Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>WordGuess</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Games</span>
                    <span class="stat-value" id="games-played">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Win %</span>
                    <span class="stat-value" id="win-percentage">0%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Streak</span>
                    <span class="stat-value" id="current-streak">0</span>
                </div>
            </div>
        </header>

        <div class="game-container">
            <div class="game-board" id="game-board">
                <!-- Game grid will be generated by JavaScript -->
            </div>

            <div class="keyboard" id="keyboard">
                <!-- Keyboard will be generated by JavaScript -->
            </div>

            <div class="game-info">
                <div class="timer" id="timer">00:00</div>
                <div class="attempts" id="attempts">Attempts: 0/6</div>
            </div>
        </div>

        <div class="modal" id="game-modal">
            <div class="modal-content">
                <h2 id="modal-title">Congratulations!</h2>
                <p id="modal-message">You guessed the word!</p>
                <div class="modal-stats">
                    <div class="modal-stat">
                        <span>Time:</span>
                        <span id="modal-time">00:00</span>
                    </div>
                    <div class="modal-stat">
                        <span>Attempts:</span>
                        <span id="modal-attempts">0</span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-primary" id="play-again">Play Again</button>
                    <button class="btn btn-secondary" id="share-result">Share</button>
                </div>
            </div>
        </div>

        <div class="hint-modal" id="hint-modal">
            <div class="hint-content">
                <h3>Need a hint?</h3>
                <p id="hint-text">The word starts with the letter...</p>
                <button class="btn btn-primary" id="use-hint">Use Hint</button>
                <button class="btn btn-secondary" id="close-hint">No Thanks</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
